<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.5;">

<h2>Redefinição de senha</h2>

<p>Olá, <strong th:text="${username}"></strong>!</p>

<p>Recebemos uma solicitação para redefinir sua senha.</p>

<p>
    Se foi você, clique no botão abaixo para criar uma nova senha:
</p>

<p>
    <a th:href="${passLink}"
       style="display:inline-block; padding:10px 16px; background:#1976d2; color:#fff; text-decoration:none; border-radius:5px;">
        Redefinir senha
    </a>
</p>

<p>
    Se você não solicitou isso, ignore este e-mail. Nenhuma alteração será feita na sua conta.
</p>

<p>Este link expira em <strong th:text="${expirationTime}"></strong>.</p>

<hr>

<p style="font-size:12px; color:gray;">
    Equipe de suporte
</p>

</body>
</html>
